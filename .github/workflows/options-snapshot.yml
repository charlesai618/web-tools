name: Options snapshot

# Commits a daily per-contract Vol/OI snapshot so options-chain.html can show a
# day-over-day change that is shared across all browsers (not per-localStorage).

on:
  schedule:
    # 22:30 UTC on weekdays = ~18:30 EDT / 17:30 EST, after the US market close.
    - cron: "30 22 * * 1-5"
  workflow_dispatch: {}        # allow manual runs from the Actions tab

permissions:
  contents: write

concurrency:
  group: options-snapshot
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Fetch CBOE snapshots
        run: python scripts/snapshot_options.py

      - name: Commit snapshot
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add options-data/
          if git diff --cached --quiet; then
            echo "No snapshot changes."
          else
            git commit -m "Update options Vol/OI snapshot [skip ci]"
            git push
          fi
