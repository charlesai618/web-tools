<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Random Selector</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #0f0f1a;
      --surface:      #1a1a2e;
      --surface2:     #252540;
      --border:       #2e2e50;
      --accent:       #7c3aed;
      --accent-light: #a78bfa;
      --accent-dark:  #5b21b6;
      --amber:        #f59e0b;
      --green:        #10b981;
      --red:          #ef4444;
      --text:         #e2e8f0;
      --muted:        #94a3b8;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Nav ── */
    nav {
      background: var(--surface);
      border-bottom: 2px solid var(--accent);
      display: flex;
      padding: 0 20px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .nav-btn {
      padding: 14px 26px;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      color: var(--muted);
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: color .2s, border-color .2s;
    }
    .nav-btn:hover  { color: var(--text); }
    .nav-btn.active { color: var(--accent-light); border-bottom-color: var(--accent-light); }

    /* ── Pages / Steps ── */
    .page { display: none; padding: 40px 28px; max-width: 980px; margin: 0 auto; }
    .page.active { display: block; }
    .step { display: none; }
    .step.active { display: block; }

    /* ── Typography ── */
    h1 { font-size: 26px; font-weight: 700; margin-bottom: 6px; }
    .subtitle { color: var(--muted); font-size: 14px; margin-bottom: 30px; }
    .label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    /* ── Inputs ── */
    input[type="number"], input[type="text"] {
      width: 100%;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 10px 14px;
      font-size: 15px;
      transition: border-color .2s, box-shadow .2s;
    }
    input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(124,58,237,.15);
    }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 10px 22px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-dark); transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }
    .btn-outline { background: transparent; border: 1.5px solid var(--border); color: var(--muted); }
    .btn-outline:hover { border-color: var(--accent); color: var(--text); }

    /* ── Layout helpers ── */
    .field { margin-bottom: 18px; }
    .row   { display: flex; align-items: flex-end; gap: 12px; flex-wrap: wrap; }
    .row .field { margin-bottom: 0; }
    .w160 { width: 160px; }
    .sep  { height: 1px; background: var(--border); margin: 28px 0; }

    /* ── Names grid ── */
    .names-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(175px, 1fr));
      gap: 12px;
      margin-bottom: 22px;
    }
    .names-grid .field { margin-bottom: 0; }

    /* ── Wheel layout ── */
    .roulette-layout {
      display: flex;
      gap: 44px;
      align-items: flex-start;
      flex-wrap: wrap;
    }

    .wheel-wrapper {
      position: relative;
      display: inline-block;
      margin-top: 28px;
      flex-shrink: 0;
    }
    .wheel-pointer {
      position: absolute;
      top: -22px;
      left: 50%;
      transform: translateX(-50%);
      width: 0; height: 0;
      border-left: 13px solid transparent;
      border-right: 13px solid transparent;
      border-top: 26px solid var(--amber);
      filter: drop-shadow(0 3px 6px rgba(0,0,0,.5));
      z-index: 2;
    }
    #wheel-canvas {
      display: block;
      cursor: pointer;
      border-radius: 50%;
      box-shadow: 0 0 0 5px var(--surface2), 0 0 40px rgba(124,58,237,.3);
      transition: box-shadow .3s;
    }
    #wheel-canvas:hover   { box-shadow: 0 0 0 5px var(--surface2), 0 0 70px rgba(124,58,237,.55); }
    #wheel-canvas.no-spin { cursor: not-allowed; }
    .wheel-hint { font-size: 13px; color: var(--muted); margin-top: 12px; text-align: center; }

    /* ── Selection panel ── */
    .selection-panel { flex: 1; min-width: 220px; }
    .panel-label {
      font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .8px;
      color: var(--muted); margin-bottom: 10px;
    }

    .progress-wrap { background: var(--surface2); border-radius: 999px; height: 6px; margin-bottom: 18px; overflow: hidden; }
    .progress-fill { background: linear-gradient(90deg, var(--accent), var(--accent-light)); height: 100%; border-radius: 999px; transition: width .4s ease; }

    /* Winner card */
    .winner-card {
      background: linear-gradient(135deg, #5b21b6, #4f46e5);
      border-radius: 12px;
      padding: 14px 20px;
      margin-bottom: 18px;
      animation: slideDown .4s cubic-bezier(.175,.885,.32,1.275);
    }
    @keyframes slideDown {
      from { opacity:0; transform: translateY(-10px) scale(.95); }
      to   { opacity:1; transform: none; }
    }
    .winner-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; opacity: .7; margin-bottom: 4px; }
    .winner-name  { font-size: 22px; font-weight: 700; }

    /* Complete card */
    .complete-card {
      background: rgba(16,185,129,.1);
      border: 1.5px solid var(--green);
      border-radius: 12px;
      padding: 14px 20px;
      margin-bottom: 18px;
    }
    .complete-card p { color: var(--green); font-weight: 600; font-size: 15px; }

    /* Selected list */
    .selected-list { list-style: none; }
    .selected-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 8px;
      animation: fadeSlide .3s ease;
    }
    @keyframes fadeSlide {
      from { opacity:0; transform: translateX(-8px); }
      to   { opacity:1; transform: none; }
    }
    .sel-num {
      width: 24px; height: 24px;
      background: var(--accent);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700;
      flex-shrink: 0;
    }
    .sel-name { font-size: 15px; }

    /* ── Numbers page ── */
    .num-form { max-width: 460px; }
    .form-row { display: flex; gap: 14px; }
    .form-row .field { flex: 1; }
    .error-msg { color: var(--red); font-size: 13px; min-height: 20px; margin-bottom: 10px; }

    .results-grid { display: flex; flex-wrap: wrap; gap: 14px; margin-top: 28px; }
    .num-chip {
      background: linear-gradient(135deg, var(--accent-dark), var(--accent));
      border-radius: 14px;
      padding: 18px 28px;
      font-size: 28px;
      font-weight: 700;
      box-shadow: 0 4px 20px rgba(124,58,237,.35);
      animation: popUp .4s cubic-bezier(.175,.885,.32,1.275) both;
    }
    @keyframes popUp {
      from { opacity:0; transform: scale(.6) translateY(10px); }
      to   { opacity:1; transform: none; }
    }
  </style>
</head>
<body>

<nav>
  <button class="nav-btn active" onclick="showPage('people',this)">🎡 People Selector</button>
  <button class="nav-btn"        onclick="showPage('numbers',this)">🎲 Number Selector</button>
</nav>

<!-- ═══════════════════ PEOPLE PAGE ═══════════════════ -->
<div id="page-people" class="page active">

  <!-- Step 1: Enter names -->
  <div id="step-setup" class="step active">
    <h1>People Selector</h1>
    <p class="subtitle">Enter everyone's name, then spin the wheel to pick winners.</p>

    <div class="row">
      <div class="field w160">
        <label class="label">Number of people</label>
        <input id="count-input" type="number" min="2" max="30" placeholder="e.g. 6"
               onkeydown="if(event.key==='Enter') generateFields()" />
      </div>
      <button class="btn btn-outline" onclick="generateFields()">Set up names →</button>
    </div>

    <div id="names-section" style="display:none; margin-top:24px;">
      <div class="sep"></div>
      <div id="names-grid" class="names-grid"></div>
      <button class="btn btn-primary" onclick="confirmNames()">Confirm names →</button>
    </div>
  </div>

  <!-- Step 2: Spin -->
  <div id="step-spin" class="step">
    <div class="row" style="margin-bottom:28px; align-items:center;">
      <h1 style="margin:0">Spin the Wheel</h1>
      <button class="btn btn-outline" onclick="backToSetup()" style="margin-left:auto">← Start over</button>
    </div>

    <!-- How many to select -->
    <div id="select-count-wrap">
      <div class="row">
        <div class="field w160">
          <label class="label">People to select</label>
          <input id="select-count" type="number" min="1" placeholder="e.g. 3"
                 onkeydown="if(event.key==='Enter') beginSpinning()" />
        </div>
        <button class="btn btn-primary" onclick="beginSpinning()">Start spinning!</button>
      </div>
    </div>

    <!-- Wheel -->
    <div id="spin-section" style="display:none; margin-top:28px;">
      <div class="roulette-layout">
        <div class="wheel-wrapper">
          <div class="wheel-pointer"></div>
          <canvas id="wheel-canvas" width="380" height="380" onclick="handleWheelClick()"></canvas>
          <p class="wheel-hint" id="wheel-hint">Click the wheel to spin!</p>
        </div>

        <div class="selection-panel">
          <div id="winner-display"></div>
          <div class="panel-label" id="progress-label"></div>
          <div class="progress-wrap">
            <div class="progress-fill" id="progress-fill" style="width:0%"></div>
          </div>
          <div class="panel-label">Selected</div>
          <ul class="selected-list" id="selected-list"></ul>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ═══════════════════ NUMBERS PAGE ═══════════════════ -->
<div id="page-numbers" class="page">
  <h1>Number Selector</h1>
  <p class="subtitle">Pick unique random numbers from a range and see them appear instantly.</p>

  <div class="num-form">
    <div class="form-row">
      <div class="field">
        <label class="label">Minimum</label>
        <input id="num-min" type="number" value="1" />
      </div>
      <div class="field">
        <label class="label">Maximum</label>
        <input id="num-max" type="number" value="100" />
      </div>
      <div class="field">
        <label class="label">Count</label>
        <input id="num-count" type="number" value="5" min="1" />
      </div>
    </div>
    <div id="num-error" class="error-msg"></div>
    <button class="btn btn-primary" onclick="generateNumbers()" style="width:100%; justify-content:center; padding:13px;">
      Generate numbers!
    </button>
  </div>

  <div id="numbers-result" style="display:none;">
    <div class="sep"></div>
    <div class="panel-label">Results</div>
    <div id="results-grid" class="results-grid"></div>
  </div>
</div>

<script>
// ─────────────────────────────────────────────
// Navigation
// ─────────────────────────────────────────────
function showPage(name, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  btn.classList.add('active');
}

// ─────────────────────────────────────────────
// Wheel state
// ─────────────────────────────────────────────
const W = {
  people:    [],
  remaining: [],
  selected:  [],
  toSelect:  0,
  angle:     0,
  spinning:  false,
  done:      false,
};

const SEG_COLORS = [
  '#7c3aed','#2563eb','#0891b2','#059669',
  '#d97706','#dc2626','#db2777','#4f46e5',
  '#0284c7','#0d9488','#65a30d','#b45309',
  '#be185d','#6d28d9','#1d4ed8','#047857',
];

// ─────────────────────────────────────────────
// Step 1 – Setup
// ─────────────────────────────────────────────
function generateFields() {
  const n = parseInt(document.getElementById('count-input').value);
  if (!n || n < 2 || n > 30) { alert('Enter a number between 2 and 30.'); return; }

  const grid = document.getElementById('names-grid');
  grid.innerHTML = '';
  for (let i = 0; i < n; i++) {
    const d = document.createElement('div');
    d.className = 'field';
    d.innerHTML = `<label class="label">Person ${i+1}</label>
                   <input type="text" class="pname" placeholder="Name ${i+1}" />`;
    grid.appendChild(d);
  }
  document.getElementById('names-section').style.display = 'block';
  grid.querySelector('input')?.focus();
}

function confirmNames() {
  const inputs = document.querySelectorAll('.pname');
  const names  = Array.from(inputs).map((inp, i) => inp.value.trim() || `Person ${i+1}`);

  W.people    = names;
  W.remaining = [...names];
  W.selected  = [];
  W.angle     = 0;
  W.done      = false;

  document.getElementById('step-setup').classList.remove('active');
  document.getElementById('step-spin').classList.add('active');
  document.getElementById('select-count-wrap').style.display = 'block';
  document.getElementById('spin-section').style.display      = 'none';
  const sc = document.getElementById('select-count');
  sc.value = '';
  sc.max   = names.length;
  sc.focus();
}

function backToSetup() {
  document.getElementById('step-spin').classList.remove('active');
  document.getElementById('step-setup').classList.add('active');
}

// ─────────────────────────────────────────────
// Step 2 – Spinning
// ─────────────────────────────────────────────
function beginSpinning() {
  const n = parseInt(document.getElementById('select-count').value);
  if (!n || n < 1 || n > W.people.length) {
    alert(`Enter a number between 1 and ${W.people.length}.`);
    return;
  }
  W.toSelect  = n;
  W.remaining = [...W.people];
  W.selected  = [];
  W.angle     = 0;
  W.spinning  = false;
  W.done      = false;

  document.getElementById('select-count-wrap').style.display = 'none';
  document.getElementById('spin-section').style.display      = 'block';
  document.getElementById('selected-list').innerHTML  = '';
  document.getElementById('winner-display').innerHTML = '';

  updateProgress();
  redrawWheel();
  setWheelState();
}

// ─────────────────────────────────────────────
// Wheel drawing
// ─────────────────────────────────────────────
function redrawWheel() {
  const canvas = document.getElementById('wheel-canvas');
  const ctx    = canvas.getContext('2d');
  const W_PX   = canvas.width, H_PX = canvas.height;
  const cx     = W_PX / 2, cy = H_PX / 2;
  const r      = Math.min(cx, cy) - 8;
  const names  = W.remaining;
  const n      = names.length;

  ctx.clearRect(0, 0, W_PX, H_PX);
  if (n === 0) return;

  const segAng = (Math.PI * 2) / n;

  for (let i = 0; i < n; i++) {
    const start = W.angle + i * segAng;
    const end   = start   + segAng;

    // Segment
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, start, end);
    ctx.closePath();
    ctx.fillStyle   = SEG_COLORS[i % SEG_COLORS.length];
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,.22)';
    ctx.lineWidth   = 2;
    ctx.stroke();

    // Text — tangential (horizontal when segment is at top)
    const mid = start + segAng / 2;
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(mid);
    ctx.translate(r * 0.63, 0);
    ctx.rotate(Math.PI / 2);  // text reads horizontally when segment is at top

    const fontSize = Math.max(9, Math.min(15, 240 / n));
    ctx.font        = `600 ${fontSize}px 'Segoe UI', sans-serif`;
    ctx.textAlign   = 'center';
    ctx.textBaseline = 'middle';

    // Truncate to fit segment
    const maxW = r * 0.52;
    let name = names[i];
    if (ctx.measureText(name).width > maxW) {
      while (name.length > 1 && ctx.measureText(name + '…').width > maxW)
        name = name.slice(0, -1);
      name += '…';
    }

    ctx.shadowColor  = 'rgba(0,0,0,.7)';
    ctx.shadowBlur   = 4;
    ctx.fillStyle    = '#fff';
    ctx.fillText(name, 0, 0);
    ctx.restore();
  }

  // Outer ring
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(255,255,255,.15)';
  ctx.lineWidth   = 5;
  ctx.stroke();

  // Center cap
  const capR  = 22;
  const grad  = ctx.createRadialGradient(cx, cy, 0, cx, cy, capR);
  grad.addColorStop(0, '#666');
  grad.addColorStop(1, '#1a1a2e');
  ctx.beginPath();
  ctx.arc(cx, cy, capR, 0, Math.PI * 2);
  ctx.fillStyle   = grad;
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,.3)';
  ctx.lineWidth   = 2;
  ctx.stroke();
}

// ─────────────────────────────────────────────
// Spin logic
// ─────────────────────────────────────────────
function handleWheelClick() {
  if (W.spinning || W.done || W.remaining.length === 0) return;

  W.spinning = true;
  setWheelState();

  const n          = W.remaining.length;
  const winnerIdx  = Math.floor(Math.random() * n);
  const segAng     = (Math.PI * 2) / n;
  const rotations  = 5 + Math.floor(Math.random() * 4); // 5–8 full spins

  // Find the smallest positive delta to land winner under the pointer (–π/2 = top)
  const curMod = ((W.angle % (Math.PI*2)) + Math.PI*2) % (Math.PI*2);
  let   tgtMod = ((-Math.PI/2 - (winnerIdx + 0.5) * segAng) % (Math.PI*2) + Math.PI*2) % (Math.PI*2);
  let   delta  = tgtMod - curMod;
  if (delta <= 0) delta += Math.PI * 2;
  const targetAngle = W.angle + delta + Math.PI * 2 * rotations;

  const startAngle = W.angle;
  const duration   = 3200 + Math.random() * 1500; // 3.2 – 4.7 s
  const t0         = performance.now();

  function frame(now) {
    const prog = Math.min((now - t0) / duration, 1);
    const ease = 1 - Math.pow(1 - prog, 5);   // quintic ease-out
    W.angle = startAngle + (targetAngle - startAngle) * ease;
    redrawWheel();
    if (prog < 1) {
      requestAnimationFrame(frame);
    } else {
      W.angle    = targetAngle;
      W.spinning = false;
      onWinner(winnerIdx);
    }
  }
  requestAnimationFrame(frame);
}

function onWinner(idx) {
  const name = W.remaining[idx];
  W.remaining.splice(idx, 1);
  W.selected.push(name);

  showWinnerCard(name, W.selected.length);
  addSelectedItem(name, W.selected.length);
  updateProgress();

  if (W.selected.length >= W.toSelect) {
    W.done = true;
    showComplete();
  }

  redrawWheel();
  setWheelState();
}

// ─────────────────────────────────────────────
// UI helpers
// ─────────────────────────────────────────────
function showWinnerCard(name, num) {
  document.getElementById('winner-display').innerHTML = `
    <div class="winner-card">
      <div class="winner-label">Selected #${num}</div>
      <div class="winner-name">${esc(name)}</div>
    </div>`;
}

function showComplete() {
  document.getElementById('winner-display').innerHTML = `
    <div class="complete-card"><p>🎉 Selection complete!</p></div>`;
}

function addSelectedItem(name, num) {
  const li  = document.createElement('li');
  li.className = 'selected-item';
  li.innerHTML = `<span class="sel-num">${num}</span><span class="sel-name">${esc(name)}</span>`;
  document.getElementById('selected-list').appendChild(li);
}

function updateProgress() {
  const done  = W.selected.length;
  const total = W.toSelect;
  document.getElementById('progress-label').textContent = `Progress: ${done} / ${total}`;
  document.getElementById('progress-fill').style.width  = (total ? (done/total)*100 : 0) + '%';
}

function setWheelState() {
  const canvas = document.getElementById('wheel-canvas');
  const hint   = document.getElementById('wheel-hint');
  if (W.done) {
    canvas.classList.add('no-spin');
    hint.textContent = 'All selections done!';
  } else if (W.spinning) {
    canvas.classList.add('no-spin');
    hint.textContent = 'Spinning…';
  } else {
    canvas.classList.remove('no-spin');
    const left = W.toSelect - W.selected.length;
    hint.textContent = `Click the wheel to spin! (${left} left)`;
  }
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─────────────────────────────────────────────
// Number Selector
// ─────────────────────────────────────────────
function generateNumbers() {
  const min   = parseInt(document.getElementById('num-min').value);
  const max   = parseInt(document.getElementById('num-max').value);
  const count = parseInt(document.getElementById('num-count').value);
  const err   = document.getElementById('num-error');

  err.textContent = '';

  if (isNaN(min) || isNaN(max) || isNaN(count)) { err.textContent = 'Please fill in all fields.'; return; }
  if (min >= max)   { err.textContent = 'Maximum must be greater than minimum.'; return; }
  if (count < 1)    { err.textContent = 'Count must be at least 1.'; return; }
  const range = max - min + 1;
  if (count > range) { err.textContent = `Range only has ${range} integers; can't pick ${count} unique ones.`; return; }

  // Fisher-Yates shuffle, take first `count`
  const pool = Array.from({ length: range }, (_, i) => min + i);
  for (let i = pool.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [pool[i], pool[j]] = [pool[j], pool[i]];
  }
  const result = pool.slice(0, count).sort((a, b) => a - b);

  const grid = document.getElementById('results-grid');
  grid.innerHTML = '';
  result.forEach((num, i) => {
    setTimeout(() => {
      const chip = document.createElement('div');
      chip.className = 'num-chip';
      chip.style.animationDelay = `${i * 70}ms`;
      chip.textContent = num;
      grid.appendChild(chip);
    }, i * 70);
  });

  document.getElementById('numbers-result').style.display = 'block';
}
</script>
</body>
</html>
